port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7894
allow-lan: true
mode: rule
log-level: warning
ipv6: true
external-controller: 0.0.0.0:9090
secret: ""
external-ui: "ui"
external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "+.baidu.com"
    - "+.919373.xyz"

tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  dns-hijack: [any:53, tcp://any:53]

dns:
  enable: true
  ipv6: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "rule-set:private_domain,cn_domain"
    - "geosite:connectivity-check"
    - "geosite:private"
    - "rule-set:fake_ip_filter_DustinWin"
  nameserver:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query
    - 1.1.1.1
    - 8.8.8.8
  nameserver-policy:
    "geosite:cn,private": [https://223.5.5.5/dns-query, https://doh.pub/dns-query]
    "rule-set:cn_domain,private_domain": [https://223.5.5.5/dns-query, https://doh.pub/dns-query]

proxy-providers:
  Core:
    url: "==MY_SUB_LINK=="
    type: http
    interval: 86400
    health-check: {enable: true, url: https://cp.cloudflare.com/generate_204, interval: 600}
    proxy: DIRECT

proxy-groups:
  - name: 🚀 主策略
    type: select
    proxies: 
      - 🛫 地区选择
      - ♿️ 节点选择
      - 🌐 其他地区
      - DIRECT

  - name: 🛫 地区选择
    type: select
    proxies: 
      - 🇸🇬 新加坡
      - 🇭🇰 香港
      - 🇯🇵 日本
      - 🇺🇸 美国
      - 🇰🇷 韩国
      - 🇨🇳 台湾

  - name: 📺 B站
    type: select
    proxies: 
      - DIRECT 
      - 🇭🇰 香港 
      - 🇨🇳 台湾
      - ♿️ 节点选择
      
  - name: 🔬 AI
    type: select
    proxies: 
      - 🇺🇸 美国 
      - 🇸🇬 新加坡
      - 🇯🇵 日本
      - 🚀 主策略

  - name: 🎬 油管
    type: select
    proxies: 
      - 🇸🇬 新加坡 
      - 🇭🇰 香港
      - 🇺🇸 美国
      - 🇯🇵 日本
      - 🚀 主策略
      - ♿️ 节点选择

  - name: 🎵 洋抖
    type: select
    proxies: 
      - 🇯🇵 日本 
      - 🇺🇸 美国
      - 🇸🇬 新加坡
      - 🚀 主策略

  - name: 🇭🇰 香港
    type: fallback
    include-all: true
    filter: "(?i)(🇭🇰|香港)"
    url: 'https://cp.cloudflare.com/generate_204'
    interval: 300
    timeout: 2000
    lazy: true

  - name: 🇨🇳 台湾
    type: fallback
    include-all: true
    filter: "(?i)(🇨🇳|台湾)"
    url: 'https://cp.cloudflare.com/generate_204'
    interval: 300
    timeout: 2000
    lazy: true

  - name: 🇯🇵 日本
    type: fallback
    include-all: true
    filter: "(?i)(🇯🇵|日本)"
    url: 'https://cp.cloudflare.com/generate_204'
    interval: 300
    timeout: 2000
    lazy: true

  - name: 🇸🇬 新加坡
    type: fallback
    include-all: true
    filter: "(?i)(🇸🇬|新加坡)"
    url: 'https://cp.cloudflare.com/generate_204'
    interval: 300
    timeout: 2000
    lazy: true

  - name: 🇺🇸 美国
    type: fallback
    include-all: true
    filter: "(?i)(🇺🇸|美国)"
    url: 'https://cp.cloudflare.com/generate_204'
    interval: 300
    timeout: 2000
    lazy: true

  - name: 🇰🇷 韩国
    type: fallback
    include-all: true
    filter: "(?i)(🇰🇷|韩国)"
    url: 'https://cp.cloudflare.com/generate_204'
    interval: 300
    timeout: 2000
    lazy: true

  - name: 🌐 其他地区
    type: select
    include-all: true
    filter: "(?i)^(?!.*(🇭🇰|🇨🇳|🇯🇵|🇸🇬|🇺🇸|🇰🇷|韩国|美国|新加坡|日本|台湾|香港)).*"

  - name: ♿️ 节点选择
    type: select
    include-all: true

  - name: 🐟 漏网之鱼
    type: select
    proxies: 
      - 🚀 主策略
      - DIRECT

  - name: 🛑 广告拦截
    type: select
    proxies: 
      - REJECT
      - DIRECT
rules:
# 拦截 Google/YouTube 的 UDP 443 端口，强迫它走 TCP
  - AND,((NETWORK,UDP),(DST-PORT,443),(DOMAIN-SUFFIX,google.com)),REJECT
  - AND,((NETWORK,UDP),(DST-PORT,443),(DOMAIN-SUFFIX,googlevideo.com)),REJECT
  - AND,((NETWORK,UDP),(DST-PORT,443),(DOMAIN-SUFFIX,youtube.com)),REJECT
  - AND,((NETWORK,UDP),(DST-PORT,443),(DOMAIN-SUFFIX,gvt1.com)),REJECT
  
  - RULE-SET,AWAvenue_Ads_Rule,🛑 广告拦截
  - DST-PORT,22,DIRECT
  - AND,((NETWORK,UDP),(DST-PORT,443),(RULE-SET,google)),REJECT

  - DOMAIN-SUFFIX,steamcontent.com,DIRECT
  - DOMAIN-SUFFIX,steamserver.net,DIRECT
  - DOMAIN-SUFFIX,steamcdn-a.akamaihd.net,DIRECT
  - DOMAIN-SUFFIX,download.epicgames.com,DIRECT
  - DOMAIN-SUFFIX,cdn.epicgames.com,DIRECT

  - RULE-SET,steam_domain,🚀 主策略
  - RULE-SET,epicgames_domain,🚀 主策略

  - DOMAIN-SUFFIX,bilivideo.com,DIRECT
  - DOMAIN-SUFFIX,bilivideo.cn,DIRECT
  - DOMAIN-SUFFIX,hdslb.com,DIRECT
  - DOMAIN-SUFFIX,szbdyd.com,DIRECT  
  - DOMAIN,api.bilibili.com,📺 B站
  - DOMAIN,app.bilibili.com,📺 B站
  - DOMAIN,bangumi.bilibili.com,📺 B站
  - DOMAIN,interface.bilibili.com,📺 B站
  - DOMAIN,api.live.bilibili.com,📺 B站
  - DOMAIN,vc.bilibili.com,📺 B站
  - RULE-SET,bilibili_domain,📺 B站
  
  - DOMAIN-SUFFIX,bard.google.com,🔬 AI
  - DOMAIN-SUFFIX,gemini.google.com,🔬 AI
  - DOMAIN-SUFFIX,ai.google.dev,🔬 AI

  - RULE-SET,ai,🔬 AI
  - RULE-SET,youtube_domain,🎬 油管
  - RULE-SET,tiktok_domain,🎵 洋抖
  - RULE-SET,spotify_domain, 🇭🇰 香港
  - RULE-SET,onedrive_domain,DIRECT

  - RULE-SET,google,🚀 主策略
  - RULE-SET,geoip-google,🚀 主策略
  - RULE-SET,telegram_ip,🚀 主策略,no-resolve
  - RULE-SET,telegram_domain,🚀 主策略

  - RULE-SET,private_domain,DIRECT
  - RULE-SET,cn_domain,DIRECT
  - RULE-SET,cn_ip,DIRECT,no-resolve
  - DOMAIN-SUFFIX,cn,DIRECT

  - RULE-SET,gfw_domain,🚀 主策略
  - RULE-SET,geolocation-!cn,🚀 主策略
  - RULE-SET,proxy,🚀 主策略
  
  - MATCH,🐟 漏网之鱼

rule-anchor:
  domain: &domain { type: http, interval: 86400, behavior: domain, format: mrs }
  ip: &ip { type: http, interval: 86400, behavior: ipcidr, format: mrs }
  yaml: &yaml { type: http, interval: 86400, behavior: domain, format: yaml }

rule-providers:
  AWAvenue_Ads_Rule: { <<: *yaml, url: "https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main//Filters/AWAvenue-Ads-Rule-Clash.yaml", path: ./ruleset/ads.yaml }
